<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenlog — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-bg">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">screen<span>log</span></div>
    <div class="auth-heading">Create account</div>
    <div class="auth-sub">Start tracking your TV shows for free</div>

    <div class="auth-error" id="auth-error"></div>

    <div class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="auth-btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
    </div>

    <div class="auth-divider"><span>or</span></div>
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.5 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });

  function setLoading(on) {
    const btn = document.getElementById('signup-btn');
    btn.textContent = on ? 'Creating account…' : 'Create Account';
    btn.disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  async function handleSignup() {
    const email   = document.getElementById('email').value.trim();
    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    showError('');
    if (!email || !pass || !confirm) { showError('Please fill in all fields.'); return; }
    if (pass.length < 6)             { showError('Password must be at least 6 characters.'); return; }
    if (pass !== confirm)            { showError('Passwords do not match.'); return; }
    setLoading(true);
    try {
      await auth.createUserWithEmailAndPassword(email, pass);
      window.location.href = 'index.html';
    } catch(e) {
      showError(friendlyError(e.code, e.message));
      setLoading(false);
    }
  }

  async function handleGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
      window.location.href = 'index.html';
    } catch(e) {
      showError(friendlyError(e.code, e.message));
    }
  }

  function friendlyError(code, message) {
    const map = {
      'auth/email-already-in-use':  'An account with this email already exists.',
      'auth/invalid-email':         'Please enter a valid email.',
      'auth/weak-password':         'Password is too weak. Use at least 6 characters.',
      'auth/popup-closed-by-user':  'Sign in was cancelled.',
      'auth/operation-not-allowed': 'Email/password sign-in is not enabled. Please enable it in Firebase Console → Authentication → Sign-in method.',
      'auth/configuration-not-found': 'Email/Password sign-in is not enabled. Go to Firebase Console → Authentication → Sign-in method → Email/Password → Enable.',
      'auth/network-request-failed': 'Network error. Check your internet connection.',
    };
    return map[code] || `Error (${code}): ${message || 'Please try again.'}`;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
